<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IgnitionOS - Cadastro">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>IgnitionOS | Cadastro</title>
</head>
<body class="login-bg">
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>
    
    <div class="auth-container" style="max-width: 500px;">
        <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-gauge-high brand-icon"></i>
                <h2>Criar Conta</h2>
                <p>Junte-se ao IgnitionOS</p>
            </div>
            
            <form action="register.php" method="POST" class="auth-form">
                <div class="input-group">
                    <label for="fullname">Nome Completo</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-address-card"></i>
                        <input type="text" id="fullname" name="fullname" placeholder="Seu nome completo" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Escolha um nome de usuário" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" id="togglePassword" title="Mostrar senha"></i>
                    </div>
                </div>
                
                <div class="input-group" style="margin-bottom: 2.5rem;">
                    <label for="password_confirm">Confirmação de Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" id="togglePasswordConfirm" title="Mostrar senha"></i>
                    </div>
                </div>
                
                <button type="submit" name="btn_register" class="btn btn-primary btn-block btn-animated">Cadastrar</button>
            </form>
            
            <div class="auth-footer">
                <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
            </div>
        </div>
    </div>

    <script>
        function setupPasswordToggle(toggleId, inputId) {
            const toggleBtn = document.querySelector(toggleId);
            const inputField = document.querySelector(inputId);

            if(toggleBtn && inputField) {
                toggleBtn.addEventListener('click', function () {
                    const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                    inputField.setAttribute('type', type);
                    
                    if (this.classList.contains('fa-eye')) {
                        this.classList.remove('fa-eye');
                        this.classList.add('fa-eye-slash');
                        this.setAttribute('title', 'Ocultar a senha');
                    } else {
                        this.classList.remove('fa-eye-slash');
                        this.classList.add('fa-eye');
                        this.setAttribute('title', 'Mostrar senha');
                    }
                });
            }
        }

        setupPasswordToggle('#togglePassword', '#password');
        setupPasswordToggle('#togglePasswordConfirm', '#password_confirm');
    </script>
</body>
</html>
