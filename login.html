<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IgnitionOS - Login">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>IgnitionOS | Login</title>
</head>
<body class="login-bg">
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>
    
    <div class="auth-container">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-gauge-high brand-icon"></i>
                <h2>Entrar</h2>
                <p>Acesse seu painel IgnitionOS</p>
            </div>
            
            <form action="login.php" method="POST" class="auth-form">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Seu nome de usuário" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" id="togglePassword" title="Mostrar senha"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember">
                        <span class="custom-checkbox">
                            <input type="checkbox" name="remember">
                            <span class="checkmark"></span>
                        </span>
                        Lembre-me
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" name="btn_login" class="btn btn-primary btn-block btn-animated">Entrar</button>
            </form>
            
            <div class="auth-footer">
                <p>Não tem uma conta? <a href="register.html">Cadastre-se</a></p>
            </div>
        </div>
    </div>
    
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Toggle do ícone
            if (this.classList.contains('fa-eye')) {
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
                this.setAttribute('title', 'Ocultar a senha');
            } else {
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
                this.setAttribute('title', 'Mostrar senha');
            }
        });
    </script>
</body>
</html>
